# Rename to haproxy.cfg to activate

# Aleph-vm populates map files with domain->IP mappings.
# HAProxy uses set-dst to route to the correct VM — no dynamic
# server management via socket is needed.


global
	log stdout format raw local0
	maxconn 10000
	chroot /var/lib/haproxy
	stats socket /run/haproxy/admin.sock mode 660 level admin
	stats timeout 30s
	user haproxy
	group haproxy
	daemon

	# Default SSL material locations
	ca-base /etc/ssl/certs
	crt-base /etc/ssl/private

	# See: https://ssl-config.mozilla.org/#server=haproxy&server-version=2.0.3&config=intermediate
        ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
        ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
        ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
	log	global
	mode	http
	#option	httplog
	option	dontlognull
        timeout connect 5000
        timeout client  300000
        timeout server  300000
	errorfile 400 /etc/haproxy/errors/400.http
	errorfile 403 /etc/haproxy/errors/403.http
	errorfile 408 /etc/haproxy/errors/408.http
	errorfile 500 /etc/haproxy/errors/500.http
	errorfile 502 /etc/haproxy/errors/502.http
	errorfile 503 /etc/haproxy/errors/503.http
	errorfile 504 /etc/haproxy/errors/504.http

frontend stats
  bind :::8404 v4v6
  stats enable
  stats uri /
  stats refresh 10s
  http-request use-service prometheus-exporter if { path /metrics }

# Frontend for HTTPS traffic (with SNI extraction)
frontend ft_ssl
    bind :::443 v4v6
    mode tcp
    maxconn 5000

    # Inspect SSL handshake, extract SNI, then accept
    tcp-request inspect-delay 2s
    tcp-request content set-var(txn.sni) req.ssl_sni if { req.ssl_hello_type 1 }
    tcp-request content accept if { req.ssl_hello_type 1 }
    log-format "HTTPS %ci : %cp %ft %b/%s %Tw/%Tc/%Tt %B %ts %ac/%fc/%bc/%sc/%rc %sq/%bq dst:%[var(txn.sni)]"

    use_backend bk_ssl if { var(txn.sni) -m found }
    default_backend bk_default_ssl

# Frontend for HTTP traffic (with Host header extraction)
frontend ft_http
    bind :::80 v4v6
    mode http
    maxconn 5000

    # Extract Host header and store it
    http-request set-var(txn.host) hdr(host)

    # Redirect to letsencrypt certbot for certificate challenge requests
    # Test URI to see if its a letsencrypt request
    acl letsencrypt-acl path_beg /.well-known/acme-challenge/
    use_backend bk_letsencrypt if letsencrypt-acl

    # Find the target server dynamically from Host header
    use_backend bk_http if { var(txn.host) -m found }
    default_backend bk_default_supervisor

# Frontend for SSH and other TCP traffic
frontend ft_ssh
    bind :::2222 v4v6 ssl crt /etc/haproxy/certs/
    mode tcp
    maxconn 1000

    # example ssh command
    # /usr/bin/ssh -o ProxyCommand="openssl s_client -quiet  -connect echo.agot.be:2222 -servername echo.agot.be" -l ubuntu dummyName
    # see https://www.haproxy.com/blog/route-ssh-connections-with-haproxy#route-ssh-connections-with-haproxy

    log-format "SSH %ci:%cp %ft %b/%s %Tw/%Tc/%Tt %B %ts %ac/%fc/%bc/%sc/%rc %sq/%bq dst:%[var(txn.sni)] "
    tcp-request content set-var(txn.sni) ssl_fc_sni
    use_backend bk_ssh

# Map files contain: domain_name vm_ip_address
# HAProxy uses set-dst to override the destination on a placeholder server.
# No dynamic server add/del via socket needed.

backend bk_ssl
    mode tcp
    option tcp-smart-connect
    tcp-request content set-var(txn.srvip) var(txn.sni),lower,map(/etc/haproxy/https_domains.map)
    acl server_found var(txn.srvip) -m found
    tcp-request content set-dst var(txn.srvip),ipmask(255.255.255.255) if server_found
    tcp-request content set-dst-port int(443) if server_found
    use-server dynamic if server_found
    use-server fallback_local unless server_found
    server dynamic 0.0.0.0:0
    server fallback_local 127.0.0.1:4443 send-proxy

backend bk_ssh
    mode tcp
    option tcp-smart-connect
    tcp-request content set-var(txn.srvip) var(txn.sni),lower,map(/etc/haproxy/ssh_domains.map)
    acl server_found var(txn.srvip) -m found
    tcp-request content set-dst var(txn.srvip),ipmask(255.255.255.255) if server_found
    tcp-request content set-dst-port int(22) if server_found
    use-server dynamic if server_found
    server dynamic 0.0.0.0:0

backend bk_http
    mode http
    http-request set-var(txn.srvip) hdr(host),lower,map(/etc/haproxy/http_domains.map)
    acl server_found var(txn.srvip) -m found
    http-request set-dst var(txn.srvip),ipmask(255.255.255.255) if server_found
    http-request set-dst-port int(80) if server_found
    use-server dynamic if server_found
    use-server fallback_local unless server_found
    server dynamic 0.0.0.0:0
    server fallback_local 127.0.0.1:4020

# Default to fallback to the aleph-vm supervisor
# Backend to terminate TLS for fallback (uses internal http frontend)
backend bk_default_ssl
    mode tcp
    server fallback_local 127.0.0.1:4443 send-proxy

# Let's encrypt Backend for certificate renewal
backend bk_letsencrypt
    server letsencrypt 127.0.0.1:8888

# Internal frontend that handles TLS termination (serve cert) and HTTP
frontend ft_terminated_ssl
    bind 127.0.0.1:4443 ssl crt /etc/haproxy/certs/ accept-proxy
    mode http
    default_backend bk_default_supervisor


# HTTP backend behind the TLS termination
backend bk_default_supervisor
    mode http
    server web1 127.0.0.1:4020
